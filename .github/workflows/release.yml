name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP '(?<=<AssemblyVersion>)[^<]+' App/Zup/Zup.csproj)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Publish
        run: dotnet publish App/Zup/Zup.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish/

      - name: Zip artifact
        shell: bash
        run: |
          cd publish
          7z a "../Zup-v${{ steps.version.outputs.VERSION }}-win-x64.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Zup ${{ steps.version.outputs.TAG }}
          files: Zup-v${{ steps.version.outputs.VERSION }}-win-x64.zip
          generate_release_notes: true
